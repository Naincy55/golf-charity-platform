<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>

  <style>
    body {
      font-family: Arial;
      display: flex;
      margin: 0;
    }

    .sidebar {
      width: 200px;
      background: #222;
      color: white;
      height: 100vh;
      padding: 20px;
    }

    .sidebar button {
      width: 100%;
      margin: 10px 0;
      padding: 10px;
      border: none;
      background: #444;
      color: white;
      cursor: pointer;
    }

    .main {
      flex: 1;
      padding: 20px;
    }

    .hidden {
      display: none;
    }

    input {
      margin: 5px;
      padding: 8px;
    }

    button {
      padding: 8px;
      margin-top: 5px;
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>

<div class="sidebar">
  <h2>Admin Panel</h2>

  <button onclick="showSection('usersSection')">Users</button>
  <button onclick="showSection('scoreSection')">Scores</button>
  <button onclick="showSection('drawSection')">Draw</button>
  <button onclick="showSection('charitySection')">Charity</button>
  <button onclick="showSection('winnerSection')">Winners</button>
</div>

<div class="main">

  <!-- USERS -->
  <div id="usersSection">
    <h3>Users</h3>
    <button onclick="loadUsers()">Refresh</button>
    <ul id="usersList"></ul>
  </div>

  <!-- SCORE -->
  <div id="scoreSection" class="hidden">
    <h3>Update Score</h3>
    <input id="userId" placeholder="User ID">
    <input id="newScore" type="number" placeholder="Score">
    <button onclick="updateScore()">Update</button>
  </div>

  <!-- DRAW -->
  <div id="drawSection" class="hidden">
    <h3>Run Draw</h3>
    <button onclick="runDraw()">Run</button>
    <p id="winnerResult"></p>
  </div>

  <!-- CHARITY -->
  <div id="charitySection" class="hidden">
    <h3>Add Charity</h3>
   <input type="text" id="users-charity" placeholder="Enter charity name">
    <button onclick="addCharity()">Add</button>

    <ul id="charityList"></ul>
  </div>

  <!-- WINNER -->
  <div id="winnerSection" class="hidden">
    <h3>Verify Winner</h3>
    <input id="winnerId" placeholder="Winner ID">
    <button onclick="verifyWinner()">Verify</button>
  </div>

</div>

<script src="js/supabaseClient.js"></script>
<script src="js/admin.js"></script>

</body>
</html>
