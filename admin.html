<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="css/admin.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>

<div class="dashboard">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>Admin Panel</h2>

    <button onclick="showSection('usersSection')">View Users</button>
    <button onclick="showSection('scoreSection')">Edit Scores</button>
    <button onclick="showSection('drawSection')">Run Draw</button>
    <button onclick="showSection('charitySection')">Add Charities</button>
    <button onclick="showSection('winnerSection')">Verify Winners</button>
  </div>


  <!-- Main Content -->
  <div class="main">

    <!-- USERS -->
    <div id="usersSection" class="section">
      <h3>All Registered Users</h3>
      <button onclick="loadUsers()">Refresh Users</button>
      <ul id="usersList"></ul>
    </div>


    <!-- EDIT SCORE -->
    <div id="scoreSection" class="section hidden">
      <h3>Edit User Score</h3>

      <input type="text" id="userId" placeholder="Enter User ID">
      <input type="number" id="newScore" placeholder="Enter New Score">

      <button onclick="updateScore()">Update Score</button>
    </div>


    <!-- RUN DRAW -->
    <div id="drawSection" class="section hidden">
      <h3>Run Lucky Draw</h3>

      <button onclick="runDraw()">Run Draw</button>

      <p id="winnerResult"></p>
    </div>


    <!-- ADD CHARITY -->
    <div id="charitySection" class="section hidden">
      <h3>Add New Charity</h3>

      <input type="text" id="charityName" placeholder="Charity Name">
      <button onclick="addCharity()">Add Charity</button>

      <h4>Charity List</h4>
      <ul id="charityList"></ul>
    </div>


    <!-- VERIFY WINNERS -->
    <div id="winnerSection" class="section hidden">
      <h3>Verify Winner</h3>

      <input type="text" id="winnerId" placeholder="Winner ID">
      <button onclick="verifyWinner()">Verify Winner</button>
    </div>

  </div>

</div>

<script src="js/supabaseClient.js"></script>
<script src="js/admin.js"></script>

</body>
</html>
