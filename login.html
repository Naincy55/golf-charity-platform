<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>⛳ Golf Charity | Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS -->
  <link rel="stylesheet" href="css/login.css">

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>

  <div class="container">

    <!-- Left Section -->
    <div class="left-panel">
      <h1>⛳ Golf Charity</h1>
      <p>Play with purpose. Give with heart.</p>
    </div>

    <!-- Right Section -->
    <div class="right-panel">
      <div class="login-box">
        <h2>Welcome Back</h2>
        <p class="subtitle">Login to continue</p>

        <input type="email" id="email" placeholder="Enter your email">
        <input type="password" id="password" placeholder="Enter your password">

        <button onclick="loginUser()" >Login as User</button>
        <button onclick="loginAdmin()" >Login as Admin</button>

 <!-- <a href="signup.html?role=user">Signup as User</a>
      <a href="signup.html?role=admin">Signup as Admin</a>  -->
        <p class="signup-text">
          Don't have an account?
          <a href="signup.html">Signup</a>
        </p>

        <p id="message"></p>
      </div>
    </div>

  </div>
 <!-- <script src="js/login.js"></script> -->
  <script src="js/supabaseClient.js"></script>
  <script src="js/auth.js"></script>

</body>
</html>
